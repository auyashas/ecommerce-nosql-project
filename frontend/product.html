<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail – ShopSmart</title>
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>

<div id="navbar-root"></div>

<main class="container">
  <div id="breadcrumb" style="padding:1rem 0;font-size:.9rem;color:var(--muted)">
    <a href="index.html">← Back to Catalog</a>
  </div>
  <div id="product-root"><div class="spinner"></div></div>
</main>

<script src="static/js/api.js"></script>
<script src="static/js/utils.js"></script>
<script>
  document.getElementById("navbar-root").innerHTML = renderNavbar();
  refreshCartBadge();

  const params = new URLSearchParams(location.search);
  const productId = params.get("id");
  let qty = 1;

  async function loadProduct() {
    if (!productId) {
      document.getElementById("product-root").innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><h2>No product ID provided</h2></div>`;
      return;
    }
    try {
      const p = await Products.get(productId);
      renderProduct(p);
      loadReviews(productId);
    } catch (e) {
      document.getElementById("product-root").innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><h2>${e.message}</h2></div>`;
    }
  }

  function renderProduct(p) {
    const rating   = p.computed?.avg_rating || 0;
    const stock    = p.stock_quantity;
    const outOfStock = stock === 0;
    const lowStock = stock > 0 && stock <= 5;

    // Build type-specific specs table
    let specsHtml = "";
    if (p.type === "electronics" && p.specs) {
      specsHtml = Object.entries(p.specs).map(([k, v]) =>
        `<tr><td>${k.replace(/_/g," ")}</td><td>${v}</td></tr>`).join("");
      if (p.warranty_years) specsHtml += `<tr><td>Warranty</td><td>${p.warranty_years} year(s)</td></tr>`;
    } else if (p.type === "book") {
      specsHtml = `
        <tr><td>Author</td><td>${p.author || "—"}</td></tr>
        <tr><td>ISBN</td><td>${p.isbn || "—"}</td></tr>
        <tr><td>Pages</td><td>${p.pages || "—"}</td></tr>`;
    } else if (p.type === "clothing") {
      specsHtml = `
        <tr><td>Sizes</td><td>${(p.sizes || []).join(", ")}</td></tr>
        <tr><td>Colors</td><td>${(p.colors || []).join(", ")}</td></tr>
        <tr><td>Material</td><td>${p.material || "—"}</td></tr>`;
    }

    document.title = `${p.name} – ShopSmart`;
    document.getElementById("product-root").innerHTML = `
      <div class="detail-layout">
        <div class="detail-img">${typeEmoji(p.type)}</div>
        <div class="detail-info">
          <div class="detail-meta">
            <span class="badge badge-${p.type === 'book' ? 'book' : p.type === 'clothing' ? 'clothing' : 'electronics'}">${p.type}</span>
            <span style="color:var(--muted);font-size:.9rem">${p.category}</span>
            ${p.daily_views ? `<span style="color:var(--muted);font-size:.85rem">👁 ${p.daily_views} views today</span>` : ""}
          </div>
          <h1>${p.name}</h1>
          <div style="color:var(--muted);font-size:.95rem">by <strong>${p.brand}</strong></div>

          ${rating > 0 ? `
            <div style="display:flex;align-items:center;gap:.5rem">
              <span class="stars">${renderStars(rating)}</span>
              <span style="font-size:.9rem;color:var(--muted)">${rating.toFixed(1)} (${p.computed.review_count} reviews)</span>
            </div>` : '<div style="color:var(--muted);font-size:.9rem">No reviews yet</div>'}

          <div class="detail-price">${formatPrice(p.price)}</div>

          <div class="${outOfStock ? '' : lowStock ? 'card-stock low' : 'card-stock'}" style="font-size:.9rem">
            ${outOfStock ? '❌ Out of stock' : lowStock ? `⚠️ Only ${stock} left in stock` : `✅ In stock (${stock} available)`}
          </div>

          ${specsHtml ? `
            <div>
              <div style="font-weight:700;margin-bottom:.5rem">Specifications</div>
              <table class="specs-table"><tbody>${specsHtml}</tbody></table>
            </div>` : ""}

          ${p.computed?.total_sold > 0 ? `<div style="font-size:.85rem;color:var(--muted)">${p.computed.total_sold} units sold</div>` : ""}

          <div class="qty-control">
            <button onclick="changeQty(-1)">−</button>
            <span class="qty-val" id="qty-display">1</span>
            <button onclick="changeQty(1)">+</button>
            <span style="font-size:.85rem;color:var(--muted)">max ${stock}</span>
          </div>

          <div style="display:flex;gap:.75rem;flex-wrap:wrap">
            <button class="btn btn-primary" id="add-btn"
              onclick="addToCart('${p._id}', '${p.name.replace(/'/g,"\\'")}', ${outOfStock})"
              ${outOfStock ? 'disabled' : ''}>
              🛒 Add to Cart
            </button>
            <a href="cart.html" class="btn btn-outline">View Cart</a>
          </div>
        </div>
      </div>

      <!-- Reviews Section -->
      <div style="margin-top:2.5rem;padding-bottom:3rem">
        <div class="section-title">⭐ Customer Reviews</div>
        <div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.5rem">
          <!-- Submit Review -->
          <div style="flex:1;min-width:280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem">
            <div style="font-weight:700;margin-bottom:1rem">Write a Review</div>
            <div style="margin-bottom:.75rem">
              <label style="font-size:.82rem;font-weight:600;color:var(--muted);display:block;margin-bottom:.35rem">RATING</label>
              <div id="star-picker" style="display:flex;gap:.25rem;font-size:1.6rem;cursor:pointer">
                ${[1,2,3,4,5].map(n=>`<span data-val="${n}" onclick="setRating(${n})" style="color:var(--border);transition:color .15s">★</span>`).join("")}
              </div>
              <input type="hidden" id="review-rating" value="0" />
            </div>
            <textarea id="review-text" rows="3" placeholder="Share your experience..."
              style="width:100%;border:1px solid var(--border);border-radius:6px;padding:.6rem .75rem;font-size:.9rem;font-family:inherit;resize:vertical"></textarea>
            <button class="btn btn-primary btn-sm" style="margin-top:.75rem" onclick="submitReview('${p._id}')">
              Submit Review
            </button>
          </div>
        </div>
        <div id="reviews-list"><div class="spinner"></div></div>
      </div>`;
  }

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById("qty-display").textContent = qty;
  }

  async function addToCart(productId, name, outOfStock) {
    if (outOfStock) return;
    try {
      await Cart.add(productId, qty);
      showToast(`${qty}× "${name}" added to cart`, "success");
      refreshCartBadge();
    } catch (e) {
      showToast(e.message, "error");
    }
  }

  // ── Reviews ───────────────────────────────────────────────────────────────
  let selectedRating = 0;

  function setRating(val) {
    selectedRating = val;
    document.getElementById("review-rating").value = val;
    document.querySelectorAll("#star-picker span").forEach((s, i) => {
      s.style.color = i < val ? "var(--accent)" : "var(--border)";
    });
  }

  async function loadReviews(pid) {
    try {
      const data = await apiFetch(`/products/${pid}/reviews`);
      const list = document.getElementById("reviews-list");
      if (!data.reviews.length) {
        list.innerHTML = `<div style="color:var(--muted);font-size:.9rem">No reviews yet. Be the first!</div>`;
        return;
      }
      list.innerHTML = data.reviews.map(r => `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem">
          <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem">
            <span style="color:var(--accent);font-size:1rem">${"★".repeat(r.rating)}${"☆".repeat(5-r.rating)}</span>
            <span style="font-size:.8rem;color:var(--muted)">${new Date(r.created_at).toLocaleDateString()}</span>
          </div>
          <div style="font-size:.92rem">${r.text || "<em style='color:var(--muted)'>No comment</em>"}</div>
        </div>`).join("") +
        (data.total > data.reviews.length
          ? `<div style="font-size:.85rem;color:var(--muted)">${data.total} total reviews</div>`
          : "");
    } catch (_) {}
  }

  async function submitReview(pid) {
    if (selectedRating === 0) { showToast("Please select a star rating", "error"); return; }
    const text = document.getElementById("review-text").value.trim();
    try {
      await apiFetch(`/products/${pid}/reviews`, {
        method: "POST",
        body: JSON.stringify({ rating: selectedRating, text }),
      });
      showToast("Review submitted!", "success");
      document.getElementById("review-text").value = "";
      setRating(0);
      loadReviews(pid);
      // Reload product to refresh avg_rating display
      loadProduct();
    } catch (e) {
      showToast(e.message, "error");
    }
  }

  // expose apiFetch for reviews (uses same base)
  function apiFetch(path, options = {}) {
    const base = (location.protocol === "file:") ? "http://localhost:5000" : (location.port === "5000" ? "" : "http://localhost:5000");
    return fetch(base + path, {
      ...options,
      headers: { "Content-Type": "application/json", "X-User-Id": getUserId(), ...(options.headers||{}) },
    }).then(async r => { const d = await r.json(); if (!r.ok) throw new Error(d.error||"Error"); return d; });
  }

  loadProduct();
</script>
</body>
</html>
