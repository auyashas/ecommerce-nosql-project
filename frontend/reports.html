<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports – ShopSmart</title>
  <link rel="stylesheet" href="static/css/style.css" />
  <style>
    .report-tabs { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1.5rem; }
    .report-tab {
      padding:.5rem 1.1rem; border-radius:8px; font-weight:600; font-size:.88rem;
      border:1.5px solid var(--border); background:var(--surface); color:var(--muted);
      cursor:pointer; transition:all .2s;
    }
    .report-tab:hover, .report-tab.active { border-color:var(--primary); color:var(--primary); background:#eff6ff; }
    .report-table { width:100%; border-collapse:collapse; font-size:.9rem; }
    .report-table th {
      padding:.6rem 1rem; text-align:left; font-weight:700; color:var(--muted);
      font-size:.78rem; text-transform:uppercase; letter-spacing:.5px;
      border-bottom:2px solid var(--border); background:var(--bg);
    }
    .report-table td { padding:.65rem 1rem; border-bottom:1px solid var(--border); }
    .report-table tr:last-child td { border-bottom:none; }
    .report-table tr:hover td { background:#f8fafc; }
    .report-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); overflow:hidden;
    }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stat-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:1.25rem; display:flex; flex-direction:column; gap:.35rem;
    }
    .stat-card .stat-label { font-size:.78rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .stat-card .stat-value { font-size:1.6rem; font-weight:900; color:var(--primary); }
    .stat-card .stat-sub { font-size:.82rem; color:var(--muted); }
    .rank-1 { color:#f59e0b; font-weight:900; }
    .rank-2 { color:#94a3b8; font-weight:800; }
    .rank-3 { color:#b45309; font-weight:800; }
  </style>
</head>
<body>

<div id="navbar-root"></div>

<main class="container" style="padding-bottom:3rem">
  <div class="page-header">
    <h1>📊 Analytics & Reports</h1>
    <span style="color:var(--muted);font-size:.9rem">MongoDB Aggregation Pipeline Results</span>
  </div>

  <!-- Summary Stats -->
  <div class="stat-grid" id="stat-grid"><div class="spinner"></div></div>

  <!-- Report Tabs -->
  <div class="report-tabs">
    <button class="report-tab active" onclick="loadReport('best-selling', this)">🏆 Best Selling</button>
    <button class="report-tab" onclick="loadReport('best-selling-by-category', this)">📦 By Category</button>
    <button class="report-tab" onclick="loadReport('monthly-revenue', this)">💰 Monthly Revenue</button>
    <button class="report-tab" onclick="loadReport('low-rated', this)">⚠️ Low Rated</button>
    <button class="report-tab" onclick="loadReport('stock-summary', this)">📋 Stock Summary</button>
  </div>

  <div id="report-root" class="report-card"><div class="spinner" style="margin:2rem auto"></div></div>
</main>

<script src="static/js/api.js"></script>
<script src="static/js/utils.js"></script>
<script>
  document.getElementById("navbar-root").innerHTML = renderNavbar("Reports");
  refreshCartBadge();

  // ── Summary stats ─────────────────────────────────────────────────────────
  async function loadStats() {
    const grid = document.getElementById("stat-grid");
    try {
      const [bs, rev, stock] = await Promise.all([
        Reports.bestSelling(),
        Reports.monthlyRevenue(),
        Reports.stockSummary(),
      ]);

      const totalRevenue = rev.monthly_revenue.reduce((s, r) => s + r.revenue, 0);
      const totalOrders  = rev.monthly_revenue.reduce((s, r) => s + r.order_count, 0);
      const totalStock   = stock.stock_summary.reduce((s, r) => s + r.total_stock, 0);
      const topProduct   = bs.best_selling[0];

      grid.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value">${formatPrice(totalRevenue)}</div>
          <div class="stat-sub">across all orders</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Orders</div>
          <div class="stat-value">${totalOrders}</div>
          <div class="stat-sub">completed orders</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Items in Stock</div>
          <div class="stat-value">${totalStock.toLocaleString()}</div>
          <div class="stat-sub">across all categories</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Top Seller</div>
          <div class="stat-value" style="font-size:1rem;line-height:1.3">${topProduct?.name || "—"}</div>
          <div class="stat-sub">${topProduct?.computed?.total_sold || 0} units sold</div>
        </div>`;
    } catch (e) {
      grid.innerHTML = `<div style="color:var(--danger)">${e.message}</div>`;
    }
  }

  // ── Report renderers ──────────────────────────────────────────────────────
  const renderers = {
    "best-selling": async () => {
      const data = await Reports.bestSelling();
      return renderRankedTable(
        data.best_selling,
        ["name", "price", "computed.total_sold"],
        ["Product", "Price", "Units Sold"],
        (row, i) => [
          `<span class="${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">#${i+1} ${row.name}</span>`,
          formatPrice(row.price),
          `<strong>${row.computed?.total_sold ?? 0}</strong>`,
        ]
      );
    },
    "best-selling-by-category": async () => {
      const data = await Reports.bestSellingByCategory();
      return renderRankedTable(
        data.best_selling_by_category,
        [],
        ["Category", "Units Sold", "Revenue"],
        (row, i) => [
          `<span class="${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">${row._id}</span>`,
          row.total_sold,
          formatPrice(row.total_revenue),
        ]
      );
    },
    "monthly-revenue": async () => {
      const data = await Reports.monthlyRevenue();
      const months = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return renderRankedTable(
        data.monthly_revenue,
        [],
        ["Month", "Orders", "Revenue"],
        (row) => [
          `${months[row._id.month]} ${row._id.year}`,
          row.order_count,
          `<strong>${formatPrice(row.revenue)}</strong>`,
        ]
      );
    },
    "low-rated": async () => {
      const data = await Reports.lowRated();
      if (!data.low_rated_products.length)
        return `<div style="padding:2rem;text-align:center;color:var(--success)">✅ No low-rated products found!</div>`;
      return renderRankedTable(
        data.low_rated_products,
        [],
        ["Product", "Avg Rating", "Reviews"],
        (row) => [
          row.name,
          `<span style="color:var(--danger)">${row.computed?.avg_rating?.toFixed(1) ?? "—"} ★</span>`,
          row.computed?.review_count ?? 0,
        ]
      );
    },
    "stock-summary": async () => {
      const data = await Reports.stockSummary();
      return renderRankedTable(
        data.stock_summary,
        [],
        ["Category", "Products", "Total Stock"],
        (row) => [
          row._id,
          row.product_count,
          `<strong>${row.total_stock}</strong>`,
        ]
      );
    },
  };

  function renderRankedTable(rows, _, headers, rowFn) {
    if (!rows.length) return `<div style="padding:2rem;text-align:center;color:var(--muted)">No data available.</div>`;
    return `
      <table class="report-table">
        <thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
        <tbody>
          ${rows.map((row, i) => `<tr>${rowFn(row, i).map(cell=>`<td>${cell}</td>`).join("")}</tr>`).join("")}
        </tbody>
      </table>`;
  }

  async function loadReport(type, tabEl) {
    // Update active tab
    document.querySelectorAll(".report-tab").forEach(t => t.classList.remove("active"));
    if (tabEl) tabEl.classList.add("active");

    const root = document.getElementById("report-root");
    root.innerHTML = '<div class="spinner" style="margin:2rem auto"></div>';
    try {
      root.innerHTML = await renderers[type]();
    } catch (e) {
      root.innerHTML = `<div style="padding:1.5rem;color:var(--danger)">Error: ${e.message}</div>`;
    }
  }

  loadStats();
  loadReport("best-selling");
</script>
</body>
</html>
